# Paths
source_dir: /path/to/git/worktree
build_dir: ./data/builds/main
raw_data_dir: ./data/raw
processed_data_dir: ./data/processed

# Compiler and binutils — absolute paths to each binary.
compiler:
  cc:      /opt/rh/gcc-toolset-12/root/usr/bin/gcc
  cxx:     /opt/rh/gcc-toolset-12/root/usr/bin/g++
  ar:      /opt/rh/gcc-toolset-12/root/usr/bin/ar
  ranlib:  /opt/rh/gcc-toolset-12/root/usr/bin/ranlib
  nm:      /opt/rh/gcc-toolset-12/root/usr/bin/nm
  objdump: /opt/rh/gcc-toolset-12/root/usr/bin/objdump
  strip:   /opt/rh/gcc-toolset-12/root/usr/bin/strip
  linker:  /opt/rh/gcc-toolset-12/root/usr/bin/ld

# Subprocess environment adjustments applied when running CMake/Ninja.
# path_prefix: directories prepended to PATH (in order).
# env: extra environment variables to set.
environment:
  path_prefix:
    - /opt/rh/gcc-toolset-12/root/usr/bin
  env:
    LD_LIBRARY_PATH: "/opt/rh/gcc-toolset-12/root/usr/lib64:/opt/rh/gcc-toolset-12/root/usr/lib"

# External dependency directories
cmake_prefix_path:
  - /path/to/boost
  - /path/to/protobuf
  # Add all directories needed for find_package

# CMake pass-through cache variables
cmake_cache_variables:
  CMAKE_EXE_LINKER_FLAGS: "-fuse-ld=mold"
  CMAKE_SHARED_LINKER_FLAGS: "-fuse-ld=mold"
  CMAKE_EXPORT_COMPILE_COMMANDS: "ON"

# Git history
git_history_months: 12

# Build parallelism
ninja_jobs: 0

# Code generator classification
# Each entry maps a generator name to a list of command-line match patterns.
# The classifier checks if any pattern appears in the COMMAND string.
# Built-in patterns are used for standard tools; add entries here for
# custom tools or to override built-in patterns.
codegen_patterns:
  MessageCompiler:
    - "MessageCompiler"
  DbAutoGen:
    - "DbAutoGen"
  TemplateCompiler:
    - "TemplateCompiler"
  # Uncomment and modify to override built-in patterns:
  # protoc:
  #   - "protoc"
  #   - "/path/to/custom/protoc"
